<!DOCTYPE html>
<html lang="en" class="h-100">
<head>
	<meta charset="utf-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>OIDC Demo App</title>
	<link rel="stylesheet" href="./webjars/bootstrap/css/bootstrap.min.css">
	<style>
		body {
			box-shadow: inset 0 0 5rem rgba(0, 0, 0, .5);
		}
	</style>
</head>
<body class="d-flex text-bg-dark">
<div class="container d-flex w-100 h-100 p-3 mx-auto">
	<main class="w-100 px-3 my-auto">
		<div class="d-flex align-items-center justify-content-between">
			<h1>OIDC Demo App</h1>
			<h2>{principal} <a href="./logout" class="btn btn-warning btn-sm ms-3">Logout</a></h2>
		</div>
		<hr class="mb-5"/>
		<h3>Access Token</h3>
		<pre class="bg-light text-dark p-3 rounded"><code>{accessToken}</code></pre>
		<hr/>
		<h3>ID Token</h3>
		<pre class="bg-light text-dark p-3 rounded"><code>{idToken}</code></pre>
		<hr/>
		<h3>User Info</h3>
		<pre class="bg-light text-dark p-3 rounded"><code>{userInfo}</code></pre>
	</main>
</div>
</body>
</html>
